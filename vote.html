<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="stylesheet" href="main.css">
        <link rel="stylesheet" href="vote.css">
        <title>
            Stock Voter
        </title>
    </head>
    
    <body>
        <header>
            <h1>Stock Voter</h1>
            <nav>
                <menu>
                    <a href="index.html">Home</a>
                    <a href="vote.html">Vote</a>
                    <a href="scoreboard.html">Scoreboard</a>
                </menu>
            </nav>
            <br><br>
        </header>
    
        <main>
            <h3>Place your votes and then submit</h3>
            <p>Visit the scoreboard page to see which stocks are the favorites amongst all users. 
                Will your favorite reach the top?
            </p>
            <form action="vote.html">
                <div>
                    <label for="Apple">Apple:</label>
                    <input type="checkbox" name="Apple" id="Apple">
                </div>
                <div>
                    <label for="Google">Google:</label>
                    <input type="checkbox" name="Google" id="Google">
                </div>
                <div>
                    <label for="Meta">Meta:</label>
                    <input type="checkbox" name="Meta" id="Meta">
                </div>
                <div>
                    <button type="submit">Submit Votes</button>
                </div>
            </form>
        </main>
    
        <footer>
            <br><br>
            <span>Jonah Larsen</span>
            <br>
            <a href="https://github.com/JonahLarsen/startup">Link to my Github Repo for my startup</a>
        </footer>
    </body>
</html>
